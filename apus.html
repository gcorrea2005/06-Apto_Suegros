    .header p { font-size: 1.1em; opacity: 0.9; margin-top: 8px; position: relative; }
    .header .sub { font-size: 0.9em; opacity: 0.7; margin-top: 4px; position: relative; }
    .badges { margin-top: 16px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; position: relative; }
    .badge { padding: 6px 18px; border-radius: 50px; font-weight: 600; font-size: 0.8em; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
    .badge.gold { background: #ffe066; color: #1a1a2e; }

    .controls {

      border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);

    .apu-grid { display: grid; gap: 20px; }

    .apu-toggle.open { transform: rotate(180deg); }

    .apu-body { padding: 0 22px 22px; }
    .apu-body.collapsed { display: none; }

    .apu-table th {
      text-align: left; padding: 10px; font-weight: 600; font-size: 0.75em;

    .total-card {

    .floating-shapes {

      25% { transform: translateY(-25px) rotate(90deg) scale(1.05); }

          const trs = item.breakdown.map(b =>
            `<tr>

              <td class="num">${b.und}</td>
              <td class="num">${b.cant}</td>
              <td class="num">$${b.vru.toLocaleString('es-CO')}</td>
              <td class="num">$${b.total.toLocaleString('es-CO')}</td>
            </tr>`
          ).join('');
          const sumMO = mo.reduce((s, b) => s + b.total, 0);
          const sumMat = mat.reduce((s, b) => s + b.total, 0);
          return `
            <div class="apu-card" data-cap="${chapter.cap}" data-search="${item.title.toLowerCase()} ${item.id}">
              <div class="apu-header" style="background:linear-gradient(90deg,${item.color},${item.color}dd)" onclick="toggleAPU(this)">
                <div>
                  <span class="apu-num">${item.id}</span>
                  <span class="apu-title">${item.title}</span>
                </div>
                <div>
                  <span class="apu-und">${item.und}</span>
                  <span class="apu-total">$${item.total.toLocaleString('es-CO')}</span>
                  <span class="apu-toggle">▼</span>
                </div>
              </div>
              <div class="apu-body">
                <table class="apu-table">
                  <thead>
                    <tr>
                      <th style="width:38%">Insumo</th>
                      <th style="width:8%" class="num">Und</th>
                      <th style="width:10%" class="num">Cant</th>
                      <th style="width:17%" class="num">Vr. Unit.</th>
                      <th style="width:12%" class="num">Vr. Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${trs}
                    <tr class="subtotal-row">
                      <td colspan="4"><strong>Total Costo Directo</strong></td>
                      <td class="num-total">$${item.total.toLocaleString('es-CO')}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>`;
        }).join('');
      }).join('');
      calcResumen();
    }

    function toggleAPU(el) {
      const body = el.parentElement.querySelector('.apu-body');
      const toggle = el.querySelector('.apu-toggle');
      body.classList.toggle('collapsed');
      toggle.classList.toggle('open');
    }

    function filterAll() {
      currentCapFilter = 'all';
      document.querySelectorAll('.apu-card').forEach(c => c.classList.remove('hidden'));
      document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
      document.querySelector('.filter-btns button:first-child').classList.add('active');
      document.getElementById('searchInput').value = '';
    }

    function filterCap(id) {
      currentCapFilter = id;
      document.querySelectorAll('.apu-card').forEach(c => {
        c.classList.toggle('hidden', c.dataset.cap !== id);
      });
      document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('searchInput').value = '';
    }

    function filterAPU() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('.apu-card').forEach(card => {
        const text = card.textContent.toLowerCase();
        const match = text.includes(q);
        const capMatch = currentCapFilter === 'all' || card.dataset.cap === currentCapFilter;
        card.classList.toggle('hidden', !match || !capMatch);
      });
    }

    function calcResumen() {
      const genero = { mo: 0, mat: 0, transp: 0, total: 0 };
      apuData.forEach(ch => {
        ch.items.forEach(item => {
          item.breakdown.forEach(b => {
            const t = b.desc.toLowerCase();
            if (t.includes('oficial') || t.includes('ayudante') || t.includes('electricista') || t.includes('plomero') || t.includes('instalador') || t.includes('carpintero') || t.includes('alistador') || t.includes('pintor') || t.includes('especializado')) {
              genero.mo += b.total;
            } else if (t.includes('transporte')) {
              genero.transp += b.total;
            } else {
              genero.mat += b.total;
            }
            genero.total += b.total;
          });
        });
      });

      // Apply quantities
      const cantidades = {
        '1.1': 37.42, '1.2': 7.18, '1.3': 7.18, '1.4': 3, '1.5': 3, '1.6': 2, '1.7': 2, '1.8': 1, '1.9': 16, '1.10': 3, '1.11': 1, '1.12': 1,
        '2.1/2.6': 16, '2.7': 8, '2.8': 1,
        '3.1/3.6': 16, '3.7': 1,
        '4.1': 37.42,
        '5.1': 7.18, '5.2': 7.18,
        '6.1': 7.18, '6.2': 19.00,
        '7.1': 37.42, '7.2': 7.18, '7.3': 19.00, '7.4': 44.60,
        '8.1': 3, '8.2': 3, '8.3': 3, '8.4': 3, '8.5': 2, '8.6': 2, '8.7': 2, '8.8': 3, '8.9': 2,
        '9.1': 3, '9.2': 3, '9.3': 3,
        '10.1': 3, '10.2/10.6': 15, '10.4': 2, '10.7': 3, '10.8': 2, '10.9': 2, '10.10': 8
      };

      let granTotal = 0;
      let totalMO = 0, totalMat = 0, totalTransp = 0;

      apuData.forEach(ch => {
        ch.items.forEach(item => {
          const cant = cantidades[item.id] || 1;
          const sub = item.total * cant;
          granTotal += sub;
          item.breakdown.forEach(b => {
            const t = b.desc.toLowerCase();
            const val = b.total * cant;
            if (t.includes('oficial') || t.includes('ayudante') || t.includes('electricista') || t.includes('plomero') || t.includes('instalador') || t.includes('carpintero') || t.includes('alistador') || t.includes('pintor') || t.includes('especializado')) {
              totalMO += val;
            } else if (t.includes('transporte')) {
              totalTransp += val;
            } else {
              totalMat += val;
            }
          });
        });
      });

      document.getElementById('totalGeneral').textContent = '$ ' + granTotal.toLocaleString('es-CO');

      const resDiv = document.getElementById('resumenCostos');
      resDiv.innerHTML = `
        <div class="resumen-item" style="background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.2)">
          <div class="ri-label">Mano de Obra</div>
          <div class="ri-value" style="color:#ff6b6b">$ ${totalMO.toLocaleString('es-CO')}</div>
        </div>
        <div class="resumen-item" style="background:rgba(79,172,254,0.15);border:1px solid rgba(79,172,254,0.2)">
          <div class="ri-label">Materiales</div>
          <div class="ri-value" style="color:#4facfe">$ ${totalMat.toLocaleString('es-CO')}</div>
        </div>
        <div class="resumen-item" style="background:rgba(85,239,196,0.15);border:1px solid rgba(85,239,196,0.2)">
          <div class="ri-label">Transporte</div>
          <div class="ri-value" style="color:#55efc4">$ ${totalTransp.toLocaleString('es-CO')}</div>
        </div>
        <div class="resumen-item" style="background:rgba(255,224,102,0.15);border:1px solid rgba(255,224,102,0.2)">
          <div class="ri-label">Cant. APU's</div>
          <div class="ri-value" style="color:#ffe066">${apuData.reduce((s,c) => s + c.items.length, 0)}</div>
        </div>
      `;
    }

    renderAPU();
  </script>
</body>
</html>
